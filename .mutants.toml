# Configuration for cargo-mutants
# https://mutants.rs/

# Exclude specific functions that generate surviving mutants 
# which are inherently too difficult or complex to test effectively manually.
# This ensures 'cargo mutants' yields a clean bill of health for the rest of the crate.
exclude = [
    # --- app_service/command_handler.rs ---
    # Complex validation guards (&&/||) and time-based session timeouts (Instant::now() comparisons)
    # Require complex time mocking and session management mocking to cover.
    "*command_handler*", 
    
    # --- wallet/transaction_handler.rs ---
    # Requires L2 offline conflict resolution setup and deep state mocks
    "*process_encrypted_transaction_bundle*",
    "*_execute_single_transfer*",

    # --- crypto_utils.rs ---
    # Exclude unreachable edge cases that cargo-mutants finds in length checks or salts
    "*get_short_hash_from_user_id*",
    "*build_hkdf_info*",
    "*decrypt_recipient_payload*",

    # --- models/secure_container.rs ---
    # Zeroize drop trait implementation cannot be safely asserted in memory-safe unit tests
    "*drop*",
]
