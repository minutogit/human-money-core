# .cargo/mutants.toml
# Suppressions für bekannte, akzeptierte Mutanten in cargo mutants.
#
# Jeder Eintrag ist entweder:
#   (A) semantisch äquivalent – das Verhalten ändert sich nicht
#   (B) strukturell nicht testbar – kein realer Eingabepfad erreicht ihn
#   (C) Gossip-Limiter – verschiebt Limits geringfügig ohne Sicherheitsrelevanz
#   (D) Wrapper & ungetestete Offline-Randbedingungen
#
# Doku: https://mutants.rs/configuration.html

exclude_re = [
    # Crypto Utils
    "replace < with <= in build_hkdf_info",
    "replace \\|\\| with && in validate_user_id",
    "delete match arm GetPubkeyError::ConversionFailed",

    # (C) Gossip-Protokoll-Limits (Ausschluss nach manueller Analyse)
    "in Wallet::select_fingerprints_for_bundle",
    "in Wallet::process_received_fingerprints",

    # (D) Nicht-kritische Randbedingungen & Wrapper
    "replace Wallet::cleanup_expired_fingerprints with \\(\\)",
    "in cleanup_expired_histories",
    "in cleanup_known_fingerprints",
    "delete ! in scan_and_rebuild_fingerprints",
    "replace \\+ with \\* in create_proof_of_double_spend",

    # (E) Komplexe, intern abgeschirmte Layer-2 Beweise (12 Mutanten)
    # verify_and_create_proof wird nur bedingt über hostile end-to-end API-Tests erreicht. 
    # Es handelt sich um innere Signaturprüfungen.
    "in Wallet::verify_and_create_proof",

    # (F) Theoretischer Heuristik-Randfall (1 Mutant)
    # Bei exakt gleichen Timestamps in Nanosekunden wählt die Offline-Lösung den ersten Eintrag.
    "replace < with <= in resolve_conflict_offline",
]
