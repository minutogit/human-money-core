# voucher_standards/standard_template.toml
# =================================================================================
# Vorlage für Gutschein-Standard-Definitionen (standard_template.toml)
# =================================================================================
#
# Diese Datei dient als umfassende Dokumentation und Kopiervorlage zur Erstellung
# neuer, signierter Gutschein-Standards. Sie erklärt alle verfügbaren Felder.
#
# Ein Standard ist in zwei kryptographische Zonen unterteilt:
# 1. [immutable]:   Der "harte Kern" des Standards. Änderungen hier ändern den Logic-Hash
#                   und brechen die Kompatibilität zu bestehenden Gutscheinen.
# 2. [mutable]:     Flexibel anpassbare Metadaten und Vorschlagswerte. Änderungen hier
#                   ändern nur die Signatur, nicht aber die logische Gültigkeit.
#
# =================================================================================
# IMMUTABLE-ZONE (In Stein gemeißelt)
# Jede Änderung hier ändert den Logic-Hash!
# =================================================================================

[immutable.identity]
# (String) Eine global eindeutige ID für diesen Standard (z.B. v4 UUID).
uuid = "STANDARD-NAME-V1-YYYY-MM"
# (String) Der offizielle, menschenlesbare Name des Standards.
name = "Name des Standards (z.B. Regional-Taler)"
# (String) Eine gängige Abkürzung für die Nennwert-Einheit des Gutscheins.
abbreviation = "RT"

[immutable.blueprint]
# (String) Die Einheit des Nennwerts, die für diesen Standard zwingend ist.
unit = "Regional-Taler"
# (String) Definiert den primären Zweck, für den der Gutschein eingelöst werden kann.
primary_redemption_type = "goods_or_services"
# (String) Die Art der Besicherung.
collateral_type = "Keine"

[immutable.features]
# (Boolean) Gibt an, ob der Gutschein teilbar ist.
allow_partial_transfers = true
# (Boolean) Gibt an, ob die Nennwerte summierbar sind.
balances_are_summable = true
# (Integer) Maximale Anzahl an Nachkommastellen für alle Beträge.
amount_decimal_places = 2
# (String) Steuert den Privacy-Modus: "public", "private", oder "flexible".
privacy_mode = "flexible"

[immutable.issuance]
# (Array von Strings) Bereich der wählbaren Gesamtlaufzeit.
validity_duration_range = ["P1Y", "P10Y"]
# (String) Minimale Restgültigkeit bei Erstellung.
issuance_minimum_validity_duration = "P6M"
# (Array von Integern) Bereich der zusätzlich benötigten Signaturen [Min, Max].
additional_signatures_range = [2, 2]
# (Array von Strings) Erlaubte Rollen für diese Zusatz-Signaturen.
allowed_signature_roles = ["guarantor"]

[immutable.transfer]
# (Boolean) Muss der Empfänger gegenzeichnen (2-Wege), oder reicht Senden (1-Weg)?
requires_recipient_signature = true

# -- Sektion für dynamische Regeln (CEL) --
[immutable.custom_rules.gender_diversity_male]
expression = "Voucher.signatures.filter(s, s.role != 'creator' && has(s.details.gender) && s.details.gender == '1').size() == 1"
message = "Gemäß ISO 5218 wird genau ein männlicher (1) Bürge benötigt."

[immutable.custom_rules.gender_diversity_female]
expression = "Voucher.signatures.filter(s, s.role != 'creator' && has(s.details.gender) && s.details.gender == '2').size() == 1"
message = "Gemäß ISO 5218 wird genau eine weibliche (2) Bürgin benötigt."

[immutable.custom_rules.fixed_collateral_type]
expression = "has(Voucher.collateral) && Voucher.collateral.type == 'Fiat-Währung'"
message = "Collateral type must be Fiat-Währung."

[immutable.custom_rules.valid_amount]
expression = "Voucher.nominal_value.amount in ['25.00', '50.00', '100.00']"
message = "Nominal value must be exactly 25.00, 50.00 or 100.00."


# =================================================================================
# MUTABLE-ZONE (Erweiterbar)
# Änderungen hier ändern den Logic-Hash NICHT.
# =================================================================================

[mutable.metadata]
# (String) Der Name des offiziellen Herausgebers des Standards.
issuer_name = "Name des Herausgebers (z.B. Community Council)"
# (String, Optional) Eine URL zur Homepage des Standards oder der Community.
homepage_url = "https://example.com/standard-info"
# (String, Optional) Eine URL zur technischen Dokumentation des Standards.
documentation_url = "https://example.com/standard-docs"
# (Array von Strings, Optional) Suchbegriffe zur Kategorisierung.
keywords = ["keyword1", "keyword2", "community-currency"]


[mutable.app_config]
# (String, Optional) Die Standard-Gültigkeitsdauer im ISO 8601-Format.
default_validity_duration = "P5Y"
# (String, Optional) Regel zur Aufrundung des Gültigkeitsdatums ("P1D", "P1M", "P1Y").
round_up_validity_to = "P1M"
# (String) Definiert den Zeitraum, wie lange ein Gutschein nach Ablauf von `valid_until` noch im Server gespeichert wird.
server_history_retention = "P3M"

[mutable.i18n.descriptions]
# (String) Mehrsprachige Beschreibungen. Der Platzhalter {{amount}} wird bei der Erstellung automatisch ersetzt.
de = "Gutschein für Waren oder Dienstleistungen im Wert von {{amount}} Einheiten."
en = "A voucher for goods or services worth {{amount}} units."

[mutable.i18n.footnotes]
# (String) Mehrsprachige Fußnoten.
de = "Optionaler Fußnotentext."
en = "Optional footnote text."

[mutable.i18n.collateral_descriptions]
# (String) Mehrsprachige Besicherungs-Erklärungen.
de = "Dieser Gutschein ist durch das Vertrauen der Gemeinschaft besichert. Nicht zutreffend bei Einlösung."
en = "This voucher is backed by the trust of the community. Not applicable upon redemption."

# =================================================================================
# Block 3: Kryptographische Signatur (ZWINGEND ERFORDERLICH)
# =================================================================================
#
# Dieser Block enthält die digitale Signatur des Herausgebers, die die
# Authentizität und Integrität dieser gesamten Standard-Datei beweist.
#
[signature]
# (String) Die `did:key` des Herausgebers. Sie enthält den öffentlichen
# Schlüssel, der zur Verifizierung der Signatur verwendet wird.
# Format: "did:key:z..."
issuer_id = "did:key:z...PublicKeyDesHerausgebers..."

# (String) Die finale Base58-kodierte Ed25519-Signatur.
# Sie signiert den SHA3-256 Hash des kanonisierten Inhalts dieser Datei
# (ohne den [signature]-Block selbst).
signature = "Base58EncodedSignature..."