# tests/test_data/standards/standard_strict_counts.toml
[metadata]
name = "Strict Counts Test Standard"
uuid = "TEST-STRICT-COUNTS-V1"
abbreviation = "SCT"
issuer_name = "Human-Money-Core Test Suite"

[template.fixed]
primary_redemption_type = "goods_or_services"
is_summable = true
is_divisible = false
[template.fixed.nominal_value]
unit = "TestUnit"
[template.fixed.collateral]
type = "None"
description = ""
redeem_condition = ""
[template.fixed.guarantor_info]
needed_count = 0
description = ""

[validation]
[validation.dynamic_rules.transactions_count]
expression = "Voucher.transactions.size() >= 1 && Voucher.transactions.size() <= 2"
message = "Transactions count must be between 1 and 2"

[validation.dynamic_rules.guarantor_count]
expression = "Voucher.signatures.filter(s, has(s.role) && s.role == 'guarantor').size() == 1"
message = "Exactly one guarantor signature is required"


[signature]
issuer_id = "did:key:z6Mkk7yqnGF3YwTrLpqrW6Hzt36gV5p82nL4s58gG4nEaG9e" # Dummy Key
signature = "dummy_signature_for_testing_purposes_only"