[immutable.identity]
uuid = "TEST-STRICT-COUNTS-V1"
name = "Strict Counts Test Standard"
abbreviation = "SCT"

[immutable.blueprint]
unit = "TestUnit"
primary_redemption_type = "goods_or_services"
collateral_type = "personal_guarantee"

[immutable.features]
allow_partial_transfers = false
balances_are_summable = true
amount_decimal_places = 2
privacy_mode = "public"
allowed_t_types = ["init", "transfer", "split", "merge"]

[immutable.issuance]
validity_duration_range = ["P0M", "P5Y"]
issuance_minimum_validity_duration = "P0M"
additional_signatures_range = [0, 0]
allowed_signature_roles = ["guarantor"]


[immutable.custom_rules.transactions_count]
expression = "Voucher.transactions.size() >= 1 && Voucher.transactions.size() <= 2"
message = "Transactions count must be between 1 and 2"

[immutable.custom_rules.guarantor_count]
expression = "Voucher.signatures.filter(s, has(s.role) && s.role == 'guarantor').size() == 1"
message = "Exactly one guarantor signature is required"

[mutable.metadata]
issuer_name = "Human-Money-Core Test Suite"

[mutable.app_config]
default_validity_duration = "P1Y"

[mutable.i18n]
descriptions = { en = "Strict Counts Test" }

[signature]
# Die `did:key` des Herausgebers, die seinen öffentlichen Schlüssel enthält.
issuer_id = "0:riw@did:key:z6Mki8QqVMb66hjtTwcceVXbZuSHTk61jqiprRvEhuotZmSA"

# Die finale Base58-kodierte Ed25519-Signatur des kanonisierten Inhalts (ohne diesen Block).
