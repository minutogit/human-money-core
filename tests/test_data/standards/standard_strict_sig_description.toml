[immutable.identity]
uuid = "SIG-DESC-TEST-V1-2025"
name = "Signature Description Standard"
abbreviation = "SDT"

[immutable.blueprint]
unit = "Unit"
primary_redemption_type = "goods_or_services"
collateral_type = "personal_guarantee"

[immutable.features]
allow_partial_transfers = false
balances_are_summable = false
amount_decimal_places = 2
privacy_mode = "public"
allowed_t_types = ["init", "transfer", "split", "merge"]

[immutable.issuance]
validity_duration_range = ["P0M", "P5Y"]
issuance_minimum_validity_duration = "P0M"
additional_signatures_range = [0, 10]
allowed_signature_roles = ["Official Approval 2025", "guarantor"]


[immutable.custom_rules.bob_approval]
expression = "Voucher.signatures.exists(s, s.signer_id == 'issuer:1oB@did:key:z6Mkoim7ZGcaKdoeD41USV5gmxfiVXXiPDeYt4T9rnEB5zfM' && s.role == 'Official Approval 2025')"
message = "Official Approval 2025 by Bob is required"

[mutable.metadata]
issuer_name = "VoucherCore Test Suite"
homepage_url = "https://example.com"

[mutable.app_config]
default_validity_duration = "P1Y"

[mutable.i18n]
descriptions = { en = "Signature Description Test" }

[signature]
