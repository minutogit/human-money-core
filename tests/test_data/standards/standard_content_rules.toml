[immutable.identity]
uuid = "TEST-CONTENT-RULES-V1"
name = "Content Rules Standard"
abbreviation = "CRT"

[immutable.blueprint]
unit = "Points"
primary_redemption_type = "goods_or_services"
collateral_type = "personal_guarantee"

[immutable.features]
allow_partial_transfers = false
balances_are_summable = true
amount_decimal_places = 2
privacy_mode = "public"

allowed_t_types = ["init", "transfer", "split", "merge"]
[immutable.issuance]
validity_duration_range = ["P0M", "P1Y"]
issuance_minimum_validity_duration = "P0M"
additional_signatures_range = [0, 0]
allowed_signature_roles = ["guarantor"]


[immutable.custom_rules.fixed_fields]
expression = "Voucher.voucher_standard.template.allow_partial_transfers == false && Voucher.nominal_value.unit == 'EUR'"
message = "Invalid core fields"

[immutable.custom_rules.allowed_values]
expression = "Voucher.nominal_value.amount in ['50.00', '100.00']"
message = "Invalid amount value"

[immutable.custom_rules.regex_patterns]
# Muss mit "INV-" anfangen, gefolgt von 6 Ziffern
expression = "Voucher.voucher_standard.template.description.matches('^INV-[0-9]{6}$')"
message = "Description matching failed"

[mutable.metadata]
issuer_name = "Human-Money-Core Test Suite"
homepage_url = ""

[mutable.app_config]
default_validity_duration = "P1Y"

[mutable.i18n.descriptions]
en = "INV-000000"

[signature]
# Die `did:key` des Herausgebers, die seinen öffentlichen Schlüssel enthält.
issuer_id = "0:riw@did:key:z6Mki8QqVMb66hjtTwcceVXbZuSHTk61jqiprRvEhuotZmSA"

# Die finale Base58-kodierte Ed25519-Signatur des kanonisierten Inhalts (ohne diesen Block).
signature = "29Z8qU3yM2CKWyQv1N2RkKkkj6VtwFBkhVdgvuHhSPUjZuzAgxVeLACHb5sco4AhBY3sMVuULEeHSkNYEu2nsXmY"
