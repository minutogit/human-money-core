# tests/test_data/standards/standard_content_rules.toml
[metadata]
name = "Content Rules Test Standard"
uuid = "TEST-CONTENT-RULES-V1"
abbreviation = "CRT"
issuer_name = "Human-Money-Core Test Suite"

[template.fixed]
primary_redemption_type = "goods_or_services"
is_summable = true
is_divisible = false # Wird durch Regel überschrieben
[template.fixed.nominal_value]
unit = "Points" # Wird durch Regel überschrieben
[template.fixed.collateral]
type = "None"
description = ""
redeem_condition = ""
[template.fixed.guarantor_info]
needed_count = 0
description = ""

[validation]
[validation.dynamic_rules.fixed_fields]
expression = "Voucher.voucher_standard.template.divisible == false && Voucher.nominal_value.unit == 'EUR'"
message = "Invalid core fields"

[validation.dynamic_rules.allowed_values]
expression = "Voucher.nominal_value.amount in ['50.00', '100.00']"
message = "Invalid amount value"

[validation.dynamic_rules.regex_patterns]
# Muss mit "INV-" anfangen, gefolgt von 6 Ziffern
expression = "Voucher.voucher_standard.template.description.matches('^INV-[0-9]{6}$')"
message = "Description matching failed"

[signature]
issuer_id = "did:key:z6Mkk7yqnGF3YwTrLpqrW6Hzt36gV5p82nL4s58gG4nEaG9e" # Dummy Key
signature = "dummy_signature_for_testing_purposes_only"