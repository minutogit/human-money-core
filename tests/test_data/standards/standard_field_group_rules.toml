[immutable.identity]
uuid = "FGR-TEST-V1"
name = "Field Group Rules Test Standard"
abbreviation = "FGR"

[immutable.blueprint]
unit = "TestUnit"
primary_redemption_type = "goods_or_services"
collateral_type = "personal_guarantee"

[immutable.features]
allow_partial_transfers = true
balances_are_summable = true
amount_decimal_places = 2
privacy_mode = "public"
allowed_t_types = ["init", "transfer", "split", "merge"]

[immutable.issuance]
validity_duration_range = ["P0M", "P5Y"]
issuance_minimum_validity_duration = "P0M"
additional_signatures_range = [3, 3]
allowed_signature_roles = ["guarantor"]


[immutable.custom_rules.gender_A]
expression = "Voucher.signatures.filter(s, has(s.details) && has(s.details.gender) && s.details.gender == 'A').size() == 1"
message = "Exactly one 'A' is required."

[immutable.custom_rules.gender_B]
expression = "Voucher.signatures.filter(s, has(s.details) && has(s.details.gender) && s.details.gender == 'B').size() == 2"
message = "Exactly two 'B's are required."

[mutable.metadata]
issuer_name = "Test Council"

[mutable.app_config]
default_validity_duration = "P1Y"

[mutable.i18n]
descriptions = { en = "Field Group Rules Test" }

[signature]
# Die `did:key` des Herausgebers, die seinen öffentlichen Schlüssel enthält.
issuer_id = "0:riw@did:key:z6Mki8QqVMb66hjtTwcceVXbZuSHTk61jqiprRvEhuotZmSA"

# Die finale Base58-kodierte Ed25519-Signatur des kanonisierten Inhalts (ohne diesen Block).
