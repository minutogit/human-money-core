# tests/test_data/standards/standard_field_group_rules.toml

# Test-Standard zur isolierten Prüfung der `field_group_rules`.

[metadata]
name = "Field Group Rules Test Standard"
uuid = "FGR-TEST-V1"
abbreviation = "FGR"
issuer_name = "Test Council"

[template.fixed]
primary_redemption_type = "goods_or_services"
is_summable = true
is_divisible = true

[template.fixed.nominal_value]
unit = "TestUnit"

[template.fixed.collateral]
type = ""
description = ""
redeem_condition = ""

[template.fixed.guarantor_info]
needed_count = 3
description = "Requires 1 'A' and 2 'B's."

[validation]
[validation.dynamic_rules.gender_A]
expression = "Voucher.signatures.filter(s, has(s.details) && has(s.details.gender) && s.details.gender == 'A').size() == 1"
message = "Exactly one 'A' is required."

[validation.dynamic_rules.gender_B]
expression = "Voucher.signatures.filter(s, has(s.details) && has(s.details.gender) && s.details.gender == 'B').size() == 2"
message = "Exactly two 'B's are required."