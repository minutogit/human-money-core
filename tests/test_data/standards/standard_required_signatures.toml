[immutable.identity]
uuid = "REQSIG-TEST-V1"
name = "Required Signatures Standard"
abbreviation = "RSG"

[immutable.blueprint]
unit = "RSGUnit"
primary_redemption_type = "goods_or_services"
collateral_type = "personal_guarantee"

[immutable.features]
allow_partial_transfers = false
balances_are_summable = false
amount_decimal_places = 2
privacy_mode = "public"

allowed_t_types = ["init", "transfer", "split", "merge"]
[immutable.issuance]
validity_duration_range = ["P0M", "P1Y"]
issuance_minimum_validity_duration = "P0M"
additional_signatures_range = [1, 1]
allowed_signature_roles = ["Official Approver"]


[immutable.custom_rules]

[mutable.metadata]
issuer_name = "Test Council"

[mutable.app_config]
default_validity_duration = "P1Y"

[mutable.i18n]
descriptions = { en = "Required Signatures Test" }

