# tests/test_data/standards/standard_conflicting_rules.toml
# Test-Standard, dessen Regeln logisch miteinander in Konflikt stehen.

[metadata]
name = "Conflicting Rules Test Standard"
uuid = "CONFLICT-TEST-V1"
abbreviation = "CFT"
issuer_name = "Test Council"

[template.fixed]
primary_redemption_type = "goods_or_services"
is_summable = false
is_divisible = false
[template.fixed.nominal_value]
unit = "TestUnit"
[template.fixed.collateral]
type = ""
description = ""
redeem_condition = ""
[template.fixed.guarantor_info]
needed_count = 0 # Wird von `counts` überschrieben
description = ""

[validation]
# Regel 1: Es müssen exakt 3 Bürgen sein.
# Veraltete Zählung entfernt.

# NEU: Regeln werden auf `signatures` mit `field = "role"` geprüft.
# Diese Regeln werden von `tests/validation/unit_service.rs`
# und `tests/validation/business_rules.rs` verwendet.
[validation.field_group_rules]
[validation.field_group_rules.signatures]
field = "role"
value_counts = [
    # Erfordert exakt 3 Bürgen (für den business_rules-Test)
    { value = "guarantor", min = 3, max = 3 },
    # Erfordert exakt 2x "A" und 2x "B" (für den unit_service-Test)
    { value = "A", min = 2, max = 2 },
    { value = "B", min = 2, max = 2 },
]

[signature]
issuer_id = "did:key:zDummy"
signature = "dummy_signature"