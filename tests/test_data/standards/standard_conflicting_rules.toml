# tests/test_data/standards/standard_conflicting_rules.toml
# Test-Standard, dessen Regeln logisch miteinander in Konflikt stehen.

[metadata]
name = "Conflicting Rules Test Standard"
uuid = "CONFLICT-TEST-V1"
abbreviation = "CFT"
issuer_name = "Test Council"

[template.fixed]
primary_redemption_type = "goods_or_services"
is_summable = false
is_divisible = false
[template.fixed.nominal_value]
unit = "TestUnit"
[template.fixed.collateral]
type = ""
description = ""
redeem_condition = ""
[template.fixed.guarantor_info]
needed_count = 0 # Wird von `counts` überschrieben
description = ""

[validation]
[validation.dynamic_rules.guarantor_count]
expression = "Voucher.signatures.filter(s, has(s.role) && s.role == 'guarantor').size() == 3"
message = "Must have exactly 3 guarantors"

[validation.dynamic_rules.role_a_count]
expression = "Voucher.signatures.filter(s, has(s.role) && s.role == 'A').size() == 2"
message = "Must have exactly 2 'A's"

[validation.dynamic_rules.role_b_count]
expression = "Voucher.signatures.filter(s, has(s.role) && s.role == 'B').size() == 2"
message = "Must have exactly 2 'B's"

[signature]
issuer_id = "did:key:zDummy"
signature = "dummy_signature"